<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PCP Interativo - Vita Power</title><style>body{margin:0;font-family:Arial;background:#111;color:#f5f5f5;padding:16px}header,.box{max-width:1050px;margin:0 auto 16px;background:#1d1d1d;border:1px solid #333;border-radius:18px;padding:16px}h1{margin:0 0 8px;font-size:24px}.sub{color:#bbb;line-height:1.4}.grid{max-width:1050px;margin:auto;display:grid;grid-template-columns:1fr 340px;gap:16px}@media(max-width:820px){.grid{grid-template-columns:1fr}}button{font:inherit}.step{width:100%;margin:7px 0;padding:14px;border-radius:14px;border:1px solid #333;background:#262626;color:#fff;display:flex;justify-content:space-between;gap:8px}.step:active,.step.sel{border-color:#d71920;background:#351719}.arrow{text-align:center;color:#aaa}.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}.done{background:#2ecc71}.doing{background:#f1c40f}.pending{background:#888}.risk{background:#d71920}.status{font-size:12px;color:#ccc;white-space:nowrap}.branchBtn{width:100%;padding:14px;border-radius:14px;border:1px dashed #d71920;background:#2b1416;color:#fff;font-weight:bold;margin:8px 0}.branch{display:none;border:1px solid #793;margin:8px 0;padding:12px;border-radius:14px;background:#251819}.branch.on{display:block}.mini{padding:11px;border-radius:12px;background:#301b1d;border:1px solid #633;margin:8px 0}.panel h2{margin-top:0}.tag{display:inline-block;border:1px solid #333;background:#282828;border-radius:999px;padding:6px 10px;margin:4px 0}li{margin:6px 0}select{width:100%;padding:11px;border-radius:10px;background:#111;color:#fff;border:1px solid #333}</style></head><body><header><h1>PCP Interativo - Vita Power</h1><div class="sub">Protótipo clicável. Toque em uma etapa para ver detalhes. Toque em lote reprovado para revelar o retrabalho.</div></header><main class="grid"><section class="box"><h3>Fluxo principal</h3><div id="flow"></div></section><aside class="box" id="panel"></aside></main><script>const steps=[['pedido','Pedido do Comercial','done','Entrada do pedido, quantidade, produto, prazo e condição comercial.','Comercial','Pedido registrado|Cliente conferido|Prazo enviado ao PCP','Planejamento PCP'],['pcp','Planejamento PCP','doing','PCP avalia prioridade, capacidade, prazo e roteiro de produção.','PCP','OP criada|Prazo validado|Roteiro definido','Verificação de matéria-prima'],['mp','Verificação de Matéria-Prima','done','Conferência de estoque, validade, lote e liberação dos insumos.','Almoxarifado / Qualidade','MP disponível|Lote aprovado|Quantidade suficiente','Alocação de linha'],['linha','Alocação da Linha','pending','Definição de máquina, sala, equipe e janela de produção.','PCP / Produção','Linha definida|Equipe alocada|Equipamento liberado','Pesagem'],['pesagem','Pesagem dos Insumos','pending','Separação e pesagem conforme fórmula e ordem de produção.','Pesagem','Balança calibrada|Insumos identificados|Pesagem conferida','Mistura'],['mistura','Mistura / Homogeneização','pending','Mistura conforme tempo padrão, sequência e capacidade do misturador.','Produção','Tempo respeitado|Misturador higienizado|Lote identificado','Envase'],['envase','Envase / Encapsulamento','pending','Envase em potes, cápsulas ou sachês conforme especificação.','Produção','Peso médio conferido|Aparência verificada|Perdas registradas','Controle de Qualidade'],['cq','Controle de Qualidade','pending','CQ avalia peso, aparência, integridade, rotulagem e conformidade.','Qualidade','Amostra coletada|Critérios avaliados|Lote liberado ou reprovado','Embalagem ou retrabalho'],['embalagem','Embalagem','pending','Rotulagem, datagem, selagem, montagem de caixas e conferência final.','Embalagem','Rótulo correto|Lote e validade corretos|Caixa identificada','Expedição'],['expedicao','Expedição','pending','Conferência fiscal, volumes, transporte e despacho ao cliente.','Expedição','NF emitida|Volumes conferidos|Transportadora acionada','Cliente']];const rework=[['reprovado','Lote Reprovado','risk','Lote segregado quando o CQ identifica desvio.','Qualidade','Lote segregado|Desvio registrado|Causa provável analisada','Retrabalho'],['retrabalho','Retrabalho','doing','Correção do lote: nova mistura, ajuste de processo ou descarte parcial.','Produção / Qualidade','Ação aprovada|Retrabalho executado|Registro atualizado','Novo CQ'],['novo-cq','Novo CQ','pending','Reavaliação do lote retrabalhado antes da liberação.','Qualidade','Amostra reavaliada|Resultado aprovado|Lote liberado','Embalagem']];const labels={done:'Concluído',doing:'Em andamento',pending:'Pendente',risk:'Reprovado'};function find(id){return steps.concat(rework).find(x=>x[0]==id)}function dot(s){return '<span class="dot '+s+'"></span>'}function render(){let html='';steps.forEach((s,i)=>{html+=`<button class="step" id="b-${s[0]}" onclick="show('${s[0]}')"><span>${s[1]}</span><span class="status">${dot(s[2])}${labels[s[2]]}</span></button>`;if(s[0]=='cq'){html+=`<button class="branchBtn" onclick="toggleBranch();show('reprovado')">⚠️ Lote reprovado - revelar retrabalho</button><div class="branch" id="branch">${rework.map(r=>`<div class="mini" onclick="show('${r[0]}')">${r[1]} <span class="status">${dot(r[2])}${labels[r[2]]}</span></div>`).join('<div class="arrow">↓</div>')}</div>`}if(i<steps.length-1)html+='<div class="arrow">↓</div>'});flow.innerHTML=html}function toggleBranch(){branch.classList.toggle('on')}function show(id){let s=find(id);document.querySelectorAll('.step').forEach(b=>b.classList.remove('sel'));let b=document.getElementById('b-'+id);if(b)b.classList.add('sel');panel.innerHTML=`<h2>${s[1]}</h2><div class="tag">${dot(s[2])}${labels[s[2]]}</div><h3>Responsável</h3><p>${s[4]}</p><h3>Descrição</h3><p>${s[3]}</p><h3>Checklist</h3><ul>${s[5].split('|').map(x=>'<li>'+x+'</li>').join('')}</ul><h3>Próxima etapa</h3><p>${s[6]}</p><h3>Alterar status visual</h3><select onchange="change('${id}',this.value)"><option value="done">Concluído</option><option value="doing">Em andamento</option><option value="pending">Pendente</option><option value="risk">Reprovado</option></select>`}function change(id,val){find(id)[2]=val;render();show(id);if(['reprovado','retrabalho','novo-cq'].includes(id))branch.classList.add('on')}render();show('pcp');</script></body></html>
