<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CRM Vita Power</title><style>body{margin:0;font-family:Arial;background:#111;color:#111}.wrap{padding:24px;min-height:100vh;background:#151515}.top{max-width:1000px;margin:0 auto 16px;color:white;display:flex;justify-content:space-between}.btn{background:#b40000;color:white;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:900;border:0}.white{background:white;color:#111}.app{max-width:1000px;margin:auto;background:white;border-radius:18px;overflow:hidden}.head{background:#080808;color:white;padding:20px;border-bottom:6px solid #b40000}.main{display:grid;grid-template-columns:320px 1fr;gap:14px;padding:14px}.panel{border:1px solid #ddd;border-radius:14px;padding:14px}.field{margin-bottom:10px}.field label{display:block;font-size:11px;font-weight:900;margin-bottom:4px;text-transform:uppercase}.field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.card{border:1px solid #ddd;border-radius:12px;padding:10px}.card small{display:block;color:#666;font-weight:900}.box{border:1px solid #ddd;border-radius:12px;margin-top:12px;overflow:hidden}.box h2{background:#111;color:white;margin:0;padding:10px;font-size:16px}.in{padding:12px;line-height:1.5}.pipe{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.st{background:#eee;border-radius:10px;padding:9px;text-align:center;font-weight:900;font-size:12px}.on{background:#b40000;color:white}.list{display:grid;gap:8px}.item{border:1px solid #ddd;border-radius:10px;background:#fafafa;padding:10px}@media(max-width:800px){.main,.cards,.pipe{grid-template-columns:1fr}.top{flex-direction:column;gap:10px}}</style></head><body><div class='wrap'><div class='top'><h1>CRM Clientes</h1><div><a class='btn white' href='workspace.html'>Voltar</a> <a class='btn' href='pl.html'>Proposta</a></div></div><main class='app'><section class='head'><h1>Vita Power CRM</h1><p>Clientes, projetos private label, pipeline e historico.</p></section><section class='main'><aside class='panel'><div class='field'><label>Cliente</label><input id='cliente' value='Novo Cliente'></div><div class='field'><label>Contato</label><input id='contato'></div><div class='field'><label>Produto</label><input id='produto' value='Projeto Private Label'></div><div class='field'><label>Status</label><select id='status'><option>Lead</option><option>Briefing</option><option>Proposta</option><option>Negociacao</option><option>Aprovado</option><option>Producao</option></select></div><div class='field'><label>Proxima acao</label><textarea id='acao'>Enviar proposta comercial.</textarea></div><button class='btn' onclick='salvar()'>Salvar cliente</button></aside><section><div class='cards'><div class='card'><small>Cliente</small><b id='sCliente'></b></div><div class='card'><small>Status</small><b id='sStatus'></b></div><div class='card'><small>Produto</small><b id='sProduto'></b></div></div><div class='box'><h2>Pipeline</h2><div class='in pipe' id='pipe'></div></div><div class='box'><h2>Resumo</h2><div class='in' id='resumo'></div></div><div class='box'><h2>Historico</h2><div class='in' contenteditable='true'>Registre aqui conversas, reunioes, propostas e pendencias.</div></div><div class='box'><h2>Clientes salvos</h2><div class='in list' id='saved'></div></div></section></section></main></div><script>var stages=['Lead','Briefing','Proposta','Negociacao','Aprovado','Producao'];function g(i){return document.getElementById(i)}function r(){sCliente.textContent=cliente.value;sStatus.textContent=status.value;sProduto.textContent=produto.value;resumo.innerHTML='<b>Cliente:</b> '+cliente.value+'<br><b>Contato:</b> '+contato.value+'<br><b>Produto:</b> '+produto.value+'<br><b>Acao:</b> '+acao.value;pipe.innerHTML=stages.map(function(x){return '<div class="st '+(x==status.value?'on':'')+'">'+x+'</div>'}).join('')}function salvar(){var a=JSON.parse(localStorage.getItem('vp_crm')||'[]');a.unshift({c:cliente.value,p:produto.value,s:status.value});localStorage.setItem('vp_crm',JSON.stringify(a));listar();alert('Salvo neste navegador.')}function listar(){var a=JSON.parse(localStorage.getItem('vp_crm')||'[]');saved.innerHTML=a.length?a.map(function(x){return '<div class="item"><b>'+x.c+'</b><br>'+x.p+' - '+x.s+'</div>'}).join(''):'Nenhum cliente salvo.'}document.querySelectorAll('input,select,textarea').forEach(function(e){e.addEventListener('input',r);e.addEventListener('change',r)});r();listar();</script></body></html>
