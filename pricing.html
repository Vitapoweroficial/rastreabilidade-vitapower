<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Precificacao Vita Power</title><style>body{margin:0;font-family:Arial;background:#111;color:#111}.wrap{padding:24px;min-height:100vh;background:#151515}.top{max-width:1200px;margin:0 auto 16px;color:#fff;display:flex;justify-content:space-between}.btn{background:#b40000;color:#fff;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:900;border:0;cursor:pointer}.white{background:#fff;color:#111}.app{max-width:1200px;margin:auto;background:#fff;border-radius:18px;overflow:hidden}.head{background:#080808;color:#fff;padding:20px;border-bottom:6px solid #b40000}.main{padding:14px}.grid{display:grid;grid-template-columns:330px 1fr;gap:14px}.panel{border:1px solid #ddd;border-radius:14px;padding:14px}.field{margin-bottom:10px}.field label{display:block;font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:4px}.field input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}.card{background:#080808;color:#fff;border-radius:12px;padding:11px}.card small{display:block;color:#aaa;font-weight:900;font-size:10px}.box{border:1px solid #ddd;border-radius:12px;margin-bottom:12px;overflow:hidden}.box h2{margin:0;background:#111;color:#fff;padding:10px;font-size:16px}.in{padding:12px;line-height:1.5}.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:collapse}th{background:#111;color:#fff;text-align:left;padding:8px;font-size:11px}td{border-bottom:1px solid #eee;padding:7px}td input{width:100%;padding:7px;border:1px solid #ddd;border-radius:7px}.good{color:#0a7b33}.bad{color:#b40000}.warn{color:#b77600}@media(max-width:900px){.grid,.cards,.cols{grid-template-columns:1fr}.top{flex-direction:column;gap:10px}}@media print{.top,.panel{display:none}.wrap{padding:0;background:#fff}.app{border-radius:0}}</style></head><body><div class='wrap'><div class='top'><h1>Precificacao Avancada</h1><div><a class='btn white' href='erp.html'>Voltar ERP</a> <button class='btn' onclick='window.print()'>PDF</button></div></div><main class='app'><section class='head'><h1>Vita Power Pricing Pro</h1><p>Materia-prima, embalagem detalhada, perda, mao de obra, cartao, comissao, impostos e margem.</p></section><section class='main'><div class='grid'><aside class='panel'><div class='field'><label>Produto</label><input id='produto' value='Produto Private Label'></div><div class='field'><label>Preco venda unitario</label><input id='preco' type='number' value='75'></div><div class='field'><label>Quantidade pedido</label><input id='qtd' type='number' value='1000'></div><div class='field'><label>Margem perda MP %</label><input id='perda' type='number' value='2'></div><div class='field'><label>Mao de obra direta</label><input id='mo' type='number' value='1.30'></div><div class='field'><label>Controle qualidade % venda</label><input id='cq' type='number' value='1'></div><div class='field'><label>Impostos % venda</label><input id='imp' type='number' value='5'></div><div class='field'><label>Taxa cartao % venda</label><input id='card' type='number' value='3'></div><div class='field'><label>Comissao representante %</label><input id='com' type='number' value='5'></div><div class='field'><label>Frete unitario</label><input id='frete' type='number' value='0.13'></div><div class='field'><label>Custo financeiro %</label><input id='fin' type='number' value='3'></div></aside><section><div class='cards'><div class='card'><small>Receita</small><b id='receita'></b></div><div class='card'><small>Custo unitario</small><b id='custo'></b></div><div class='card'><small>MC un.</small><b id='mcun'></b></div><div class='card'><small>MC %</small><b id='mcp'></b></div><div class='card'><small>Lucro pedido</small><b id='lucro'></b></div></div><div class='cols'><div class='box'><h2>Materia-prima</h2><div class='in'><table><thead><tr><th>MP</th><th>%</th><th>R$/kg</th></tr></thead><tbody id='mp'></tbody></table><button class='btn' onclick='addMP()'>Add MP</button></div></div><div class='box'><h2>Embalagem detalhada</h2><div class='in'><table><thead><tr><th>Item</th><th>Custo un.</th></tr></thead><tbody id='emb'></tbody></table><button class='btn' onclick='addEmb()'>Add embalagem</button></div></div></div><div class='box'><h2>Resumo de custos</h2><div class='in' id='resumo'></div></div><div class='box'><h2>Diagnostico</h2><div class='in' id='diag'></div></div></section></div></section></main></div><script>var mps=[['WPC 80',70,58],['Aroma',5,72],['Sucralose',0.08,180],['Base ajuste',24.92,8.5]];var embs=[['Pote ou sache',1.20],['Tampa',0.35],['Rotulo',0.42],['Lacre',0.10],['Caixa',0.30],['Fita/insumos expedicao',0.05]];function g(i){return document.getElementById(i)}function brl(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function render(){mp.innerHTML=mps.map(function(x,i){return '<tr><td><input value="'+x[0]+'" oninput="mps['+i+'][0]=this.value;calc()"></td><td><input type="number" value="'+x[1]+'" oninput="mps['+i+'][1]=parseFloat(this.value)||0;calc()"></td><td><input type="number" value="'+x[2]+'" oninput="mps['+i+'][2]=parseFloat(this.value)||0;calc()"></td></tr>'}).join('');emb.innerHTML=embs.map(function(x,i){return '<tr><td><input value="'+x[0]+'" oninput="embs['+i+'][0]=this.value;calc()"></td><td><input type="number" value="'+x[1]+'" oninput="embs['+i+'][1]=parseFloat(this.value)||0;calc()"></td></tr>'}).join('')}function addMP(){mps.push(['Nova MP',0,0]);render();calc()}function addEmb(){embs.push(['Novo item',0]);render();calc()}function calc(){var preco=+g('preco').value||0,q=+g('qtd').value||0,per=+g('perda').value||0;var mpUnit=0;mps.forEach(function(x){mpUnit+=(x[1]||0)/100*(x[2]||0)});mpUnit=mpUnit/1;var embUnit=embs.reduce(function(a,b){return a+(+b[1]||0)},0);var vars=preco*((+cq.value||0)+(+imp.value||0)+(+card.value||0)+(+com.value||0)+(+fin.value||0))/100;var total=mpUnit*(1+per/100)+embUnit+(+mo.value||0)+(+frete.value||0)+vars;var mc=preco-total;var pct=preco?mc/preco:0;receita.textContent=brl(preco*q);custo.textContent=brl(total);mcun.textContent=brl(mc);mcp.textContent=(pct*100).toFixed(1)+'%';lucro.textContent=brl(mc*q);resumo.innerHTML='Materia-prima: '+brl(mpUnit)+'<br>MP com perda: '+brl(mpUnit*(1+per/100))+'<br>Embalagem total: '+brl(embUnit)+'<br>Mao de obra: '+brl(+mo.value||0)+'<br>Frete: '+brl(+frete.value||0)+'<br>Variaveis sobre venda: '+brl(vars)+'<br><b>Custo total unitario: '+brl(total)+'</b>';var cls=pct>=.30?'good':pct>=.20?'warn':'bad';diag.innerHTML='<b class="'+cls+'">Margem de contribuicao: '+(pct*100).toFixed(1)+'%</b><br>'+(pct<.15?'Evitar venda ou reajustar preco.':pct<.25?'Venda estrategica, revisar custos e prazo.':'Margem saudavel para proposta.')}document.querySelectorAll('input').forEach(function(e){e.addEventListener('input',calc)});render();calc();</script></body></html>
